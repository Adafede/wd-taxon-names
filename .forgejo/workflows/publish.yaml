name: Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: codeberg-tiny
    steps:
      - uses: https://github.com/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/git-pages@v2
        with:
          site: https://adafede.codeberg.page/wd-taxon-names/ 
          token: ${{ forge.token }}
          source: .
