name: Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: codeberg-tiny
    steps:
      - uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/git-pages@v2
        with:
          site: https://adafede.codeberg.page/wd-taxon-names/ 
          token: ${{ forge.token }}
          source: .
